# Development Profile Configuration for user-service

# PostgreSQL Configuration (Local Development)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/foodie_users}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.shashi.foodie.userservice=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS (Permissive for local development)
cors.allowed-origins=http://localhost:3000,http://localhost:4200
