# Development Profile Configuration for restaurant-service

# MySQL Configuration (Local Development)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/restaurant}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Elasticsearch Configuration (Local Development)
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://localhost:9200}
spring.elasticsearch.username=${ELASTICSEARCH_USERNAME:elastic}
spring.elasticsearch.password=${ELASTICSEARCH_PASSWORD:G346POXf+todNoP2Mu1B}

# Logging
logging.level.root=INFO
logging.level.com.shashi.foodie.restaurant=DEBUG
logging.level.org.springframework.data.elasticsearch=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
