# Development Profile Configuration for order-service

# H2 In-Memory Database (Local Development)
spring.datasource.url=jdbc:h2:mem:orderdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-ui

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# External Services (Local Development - use Eureka service discovery)
restaurant.service.url=${RESTAURANT_SERVICE_URL:http://localhost:8082}

# Logging
logging.level.root=INFO
logging.level.com.shashi.foodie.orderservice=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
